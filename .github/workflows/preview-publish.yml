name: Preview Publish

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to create a preview for'
        required: true
        type: string

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.inputs.pr_number }}/head

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        working-directory: packages/core

      - name: Type checking
        run: npm run typecheck
        working-directory: packages/core

      - name: Run tests
        run: npm test
        working-directory: packages/core

      - name: Build
        run: npm run build
        working-directory: packages/core

      - name: Set preview version
        id: version
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PREVIEW_VERSION="${CURRENT_VERSION}-pr.${{ github.event.inputs.pr_number }}.${{ github.run_number }}"
          npm version "$PREVIEW_VERSION" --no-git-tag-version
          echo "version=$PREVIEW_VERSION" >> $GITHUB_OUTPUT
        working-directory: packages/core

      - name: Publish preview to npm
        run: npm publish --access public --tag pr
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number('${{ github.event.inputs.pr_number }}'),
              body: `📦 Preview package published!\n\n\`\`\`\nnpm install @workflow/core@${version}\n\`\`\`\n\nInstall with:\n\`\`\`bash\nnpm install @workflow/core@pr\n\`\`\`\n\nVersion: \`${version}\``
            });
