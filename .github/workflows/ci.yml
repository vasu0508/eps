name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci
        working-directory: packages/core

      - name: Type checking
        run: npm run typecheck
        working-directory: packages/core

      - name: Run tests
        run: npm test
        working-directory: packages/core

      - name: Build
        run: npm run build
        working-directory: packages/core
